name: Fetch Comments

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # 10分ごと（任意）

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.x"

    - name: Install requests
      run: pip install requests

    - name: Run script
      run: python script.py

    - name: Commit & Push
      run: |
        git config user.name "bot"
        git config user.email "bot@example.com"
        git add comments.json progress.txt
        git commit -m "update comments" || echo "no change"
        git push
