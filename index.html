<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（返信対応 完全版）</title>

<style>
body { font-family: sans-serif; margin-right: 160px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 150px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

.vertical {
  writing-mode: vertical-rl;
  height: 120px;
}

button {
  width: 100%;
  margin-top: 5px;
}

.time {
  color: gray;
  font-size: 12px;
}

input {
  width: 100%;
  margin-top: 5px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（返信対応）</h2>

<div id="control">

<div>速度</div>
<input type="range" id="speed" min="1" max="10000" value="1" class="vertical">
<div id="speedVal">1x</div>

<hr>

<div>位置</div>
<input type="range" id="seek" min="0" max="100" value="0" class="vertical">
<div id="seekVal">0%</div>

<hr>

<div>開始時間</div>
<input type="text" id="startTimeInput" placeholder="YYYY/MM/DD HH:MM:SS">
<button onclick="jumpToTime()">時間ジャンプ</button>

<button onclick="start()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="scrollBottom()">↓</button>

</div>

<div id="list"></div>

<script>

let data = [];
let running = false;
let paused = false;

let baseTime = 0;
let index = 0;
let forcedIndex = null;

let virtualTime = 0;
let lastFrameTime = 0;

const list = document.getElementById("list");
const speedEl = document.getElementById("speed");
const seekEl = document.getElementById("seek");

speedEl.oninput = () => {
  document.getElementById("speedVal").innerText = speedEl.value + "x";
};

seekEl.oninput = () => {
  document.getElementById("seekVal").innerText = seekEl.value + "%";
};

function timeAgo(dateString){
  const now = new Date();
  const past = new Date(dateString);
  const diff = (now - past) / 1000;

  if(diff < 60) return Math.floor(diff) + "秒前";
  if(diff < 3600) return Math.floor(diff/60) + "分前";
  if(diff < 86400) return Math.floor(diff/3600) + "時間前";
  if(diff < 2592000) return Math.floor(diff/86400) + "日前";
  if(diff < 31536000) return Math.floor(diff/2592000) + "ヶ月前";
  return Math.floor(diff/31536000) + "年前";
}

async function loadData(){
  const res = await fetch("comments.json");
  data = await res.json();
  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));
}

let autoScroll = true;
window.addEventListener("scroll", () => {
  autoScroll = window.innerHeight + window.scrollY >= document.body.offsetHeight - 100;
});

// 🔥 ID→コメント内容の辞書（返信元表示用）
const commentLookup = {};

function showComment(c){

  const div = document.createElement("div");
  div.className = "comment";

  if(c.parent_id){
    div.classList.add("reply");
  }

  const exact = new Date(c.datetime_created).toLocaleString();

  // 🔥 返信元の情報
  let replyInfo = "";

  if(c.parent_id && commentLookup[c.parent_id]){
    const parent = commentLookup[c.parent_id];
    replyInfo = `
<div style="color:#555;font-size:12px;">
↪ ${parent.author.username}: ${parent.content.slice(0,30)}
</div>`;
  }

  div.innerHTML = `
<b>${c.author.username}</b>
${replyInfo}
<div class="time">${timeAgo(c.datetime_created)} / ${exact}</div>
<div>${c.content}</div>
`;

  list.appendChild(div);

  // 🔥 登録（あとで返信参照できるように）
  commentLookup[c.id] = c;

  if(autoScroll){
    window.scrollTo({ top: document.body.scrollHeight });
  }
}

async function jumpToTime(){

  if(data.length === 0){
    await loadData();
  }

  const input = document.getElementById("startTimeInput").value;
  const target = new Date(input).getTime();

  if(isNaN(target)){
    alert("形式は YYYY/MM/DD HH:MM:SS");
    return;
  }

  let closestIndex = data.length - 1;

  for(let i = 0; i < data.length; i++){
    let t = new Date(data[i].datetime_created).getTime();

    if(t >= target){

      if(i > 0){
        let prev = new Date(data[i-1].datetime_created).getTime();

        if(Math.abs(prev - target) < Math.abs(t - target)){
          closestIndex = i - 1;
        } else {
          closestIndex = i;
        }
      } else {
        closestIndex = i;
      }

      break;
    }
  }

  forcedIndex = closestIndex;

  const percent = Math.floor((closestIndex / data.length) * 100);
  seekEl.value = percent;
  document.getElementById("seekVal").innerText = percent + "%";

  running = false;

  setTimeout(() => {
    start();
  }, 50);
}

async function start(){

  if(running) return;
  running = true;
  paused = false;

  if(data.length === 0){
    await loadData();
  }

  list.innerHTML = "";
  Object.keys(commentLookup).forEach(k => delete commentLookup[k]);

  let seekIndex;

  if(forcedIndex !== null){
    seekIndex = forcedIndex;
    forcedIndex = null;
  } else {
    seekIndex = Math.floor((seekEl.value / 100) * data.length);
  }

  baseTime = new Date(data[seekIndex].datetime_created).getTime();
  index = seekIndex;

  virtualTime = 0;
  lastFrameTime = performance.now();

  function loop(){

    if(!running) return;

    if(paused){
      requestAnimationFrame(loop);
      return;
    }

    let now = performance.now();
    let delta = now - lastFrameTime;
    lastFrameTime = now;

    let speed = speedEl.value;
    virtualTime += delta * speed;

    if(index < data.length){

      let t = new Date(data[index].datetime_created).getTime();
      let rel = t - baseTime;

      if(rel <= virtualTime){
        showComment(data[index]);
        index++;
      }

    }

    requestAnimationFrame(loop);
  }

  loop();
}

function pause(){
  paused = !paused;
}

function scrollBottom(){
  window.scrollTo({ top: document.body.scrollHeight });
  autoScroll = true;
}

</script>

</body>
</html>
