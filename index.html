<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（完全版）</title>

<style>
body { font-family: sans-serif; }
.comment { padding: 6px; border-bottom: 1px solid #ccc; }
.reply { margin-left: 20px; background: #f5f5f5; }
button { margin: 5px; }
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（完全版）</h2>

速度:
<input type="range" id="speed" min="1" max="10000" value="100">
<span id="speedVal">100</span>倍

<br><br>

<button onclick="start()">▶ 再生</button>
<button onclick="pause()">⏸ 一時停止</button>
<button onclick="scrollBottom()">↓ 最新へ</button>

<div id="list"></div>

<script>

let data = [];
let running = false;
let paused = false;

const list = document.getElementById("list");

// --- 速度表示 ---
document.getElementById("speed").oninput = function(){
  document.getElementById("speedVal").innerText = this.value;
};

// --- JSON読み込み ---
async function loadData(){
  const res = await fetch("comments.json");
  data = await res.json();

  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));
}

// --- 下にいるか判定 ---
function isAtBottom() {
  return window.innerHeight + window.scrollY >= document.body.offsetHeight - 50;
}

// --- コメント表示 ---
function showComment(c){
  const div = document.createElement("div");
  div.className = "comment";

  if(c.is_reply){
    div.classList.add("reply");
  }

  div.innerHTML = `
    <b>${c.author.username}</b><br>
    ${c.content}
  `;

  list.appendChild(div);

  // 下にいる時だけスクロール
  if (isAtBottom()) {
    window.scrollTo(0, document.body.scrollHeight);
  }
}

// --- 再生 ---
async function start(){
  if(running) return;

  running = true;
  paused = false;

  await loadData();

  for(let i=0;i<data.length;i++){

    // 一時停止対応
    while(paused){
      await new Promise(r => setTimeout(r, 200));
    }

    showComment(data[i]);

    if(i < data.length - 1){

      let t1 = new Date(data[i].datetime_created);
      let t2 = new Date(data[i+1].datetime_created);

      let diff = (t2 - t1) / 1000;
      let speed = document.getElementById("speed").value;

      let wait = diff / speed;

      // 最小待機だけ制限（重要）
      if(wait < 0.01) wait = 0.01;

      await new Promise(r => setTimeout(r, wait * 1000));
    }
  }

  running = false;
}

// --- 一時停止 ---
function pause(){
  paused = !paused;
}

// --- 最新へ ---
function scrollBottom(){
  window.scrollTo(0, document.body.scrollHeight);
}

</script>

</body>
</html>
