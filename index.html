<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（完全最終＋返信対応）</title>

<style>
body { font-family: sans-serif; margin-right: 140px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 120px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

.vertical {
  writing-mode: bt-lr;
  height: 150px;
}

button {
  width: 100%;
  margin-top: 5px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（完全最終＋返信対応）</h2>

<div id="control">

  <!-- 速度 -->
  <div>速度</div>
  <input type="range" id="speed" min="1" max="10000" value="100" class="vertical">
  <div id="speedVal">100x</div>

  <hr>

  <!-- 時間バー -->
  <div>位置</div>
  <input type="range" id="seek" min="0" max="100" value="0" class="vertical">
  <div id="seekVal">0%</div>

  <button onclick="start()">▶</button>
  <button onclick="pause()">⏸</button>
  <button onclick="scrollBottom()">↓</button>

</div>

<div id="list"></div>

<script>

let data = [];
let running = false;
let paused = false;
let currentIndex = 0;

const list = document.getElementById("list");
const speedEl = document.getElementById("speed");
const seekEl = document.getElementById("seek");

// --- 表示 ---
speedEl.oninput = () => {
  document.getElementById("speedVal").innerText = speedEl.value + "x";
};

seekEl.oninput = () => {
  document.getElementById("seekVal").innerText = seekEl.value + "%";
};

// --- 読み込み ---
async function loadData(){
  const res = await fetch("comments.json");
  data = await res.json();

  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));
}

// --- スクロール制御 ---
let autoScroll = true;

window.addEventListener("scroll", () => {
  autoScroll = window.innerHeight + window.scrollY >= document.body.offsetHeight - 100;
});

// --- 返信ツリー用 ---
const commentMap = {};

// --- コメント表示（返信対応＋安定描画） ---
async function showComment(c){

  const div = document.createElement("div");
  div.className = "comment";

  if(c.parent_id){
    div.classList.add("reply");
  }

  div.innerHTML = `
    <b>${c.author.username}</b><br>
    ${c.content}
  `;

  commentMap[c.id] = div;

  // 親の下に入れる
  if(c.parent_id && commentMap[c.parent_id]){
    commentMap[c.parent_id].appendChild(div);
  } else {
    list.appendChild(div);
  }

  // 描画待ち
  await new Promise(requestAnimationFrame);

  if (autoScroll) {
    window.scrollTo({ top: document.body.scrollHeight });
  }
}

// --- スマート待機（速度リアル反映） ---
async function smartWait(diff){

  let passed = 0;

  while(passed < diff){

    let speed = speedEl.value;

    let step = 0.05; // 細かく分割
    let wait = step / speed;

    if(wait < 0.002) wait = 0.002;

    await new Promise(r => setTimeout(r, wait * 1000));

    passed += step;
  }
}

// --- 再生 ---
async function start(){
  if(running) return;

  running = true;
  paused = false;

  if(data.length === 0){
    await loadData();
  }

  currentIndex = Math.floor((seekEl.value / 100) * data.length);

  list.innerHTML = "";
  Object.keys(commentMap).forEach(k => delete commentMap[k]);

  for(let i = currentIndex; i < data.length; i++){

    while(paused){
      await new Promise(r => setTimeout(r, 100));
    }

    await showComment(data[i]);

    // シーク更新
    currentIndex = i;
    seekEl.value = Math.floor((i / data.length) * 100);
    document.getElementById("seekVal").innerText = seekEl.value + "%";

    if(i < data.length - 1){

      let t1 = new Date(data[i].datetime_created);
      let t2 = new Date(data[i+1].datetime_created);

      let diff = (t2 - t1) / 1000;

      await smartWait(diff);
    }
  }

  running = false;
}

// --- 一時停止 ---
function pause(){
  paused = !paused;
}

// --- 最新へ ---
function scrollBottom(){
  window.scrollTo({ top: document.body.scrollHeight });
  autoScroll = true;
}

</script>

</body>
</html>
