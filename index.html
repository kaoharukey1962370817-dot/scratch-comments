<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（読み込みデバッグ完全版）</title>

<style>
body { font-family: sans-serif; margin-right: 160px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 150px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

.vertical {
  writing-mode: vertical-rl;
  height: 120px;
}

button {
  width: 100%;
  margin-top: 5px;
}

.time {
  color: gray;
  font-size: 12px;
}

input {
  width: 100%;
  margin-top: 5px;
}

/* 🔥 デバッグ表示 */
#debug {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-height: 150px;
  overflow-y: auto;
  background: black;
  color: #0f0;
  font-size: 12px;
  padding: 5px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（デバッグ版）</h2>

<div id="control">

<div>速度</div>
<input type="range" id="speed" min="1" max="10000" value="1" class="vertical">
<div id="speedVal">1x</div>

<button onclick="start()">▶</button>

</div>

<div id="list"></div>

<!-- 🔥 デバッグ表示 -->
<div id="debug"></div>

<script>

const debugEl = document.getElementById("debug");

function log(msg){
  console.log(msg);
  debugEl.innerHTML += msg + "<br>";
}

let data = [];
const commentLookup = {};

async function loadData(){

  log("読み込み開始...");

  try{
    const res = await fetch("comments.json");

    log("ステータス: " + res.status);

    const text = await res.text();
    log("データ先頭: " + text.slice(0,100));

    data = JSON.parse(text);

  }catch(e){
    log("❌ エラー: " + e);
    return;
  }

  log("件数: " + data.length);

  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));

  data.forEach(c => {
    commentLookup[c.id] = c;
  });

  // 🔥 返信チェック
  const replySample = data.find(c => c.parent_id !== null);

  if(replySample){
    log("返信あり: OK");
    log("親ID: " + replySample.parent_id);

    if(commentLookup[replySample.parent_id]){
      log("親も存在: OK");
    } else {
      log("❌ 親が見つからない（IDズレ）");
    }

  } else {
    log("❌ 返信が存在しない（script.pyの問題）");
  }

}

function showComment(c){

  const div = document.createElement("div");
  div.className = "comment";

  if(c.parent_id){
    div.classList.add("reply");
  }

  let replyInfo = "";

  if(c.parent_id && commentLookup[c.parent_id]){
    const parent = commentLookup[c.parent_id];
    replyInfo = `↪ ${parent.author.username}: ${parent.content.slice(0,20)}<br>`;
  }

  div.innerHTML = `
<b>${c.author.username}</b><br>
${replyInfo}
${c.content}
`;

  document.getElementById("list").appendChild(div);
}

async function start(){

  await loadData();

  if(data.length === 0){
    log("❌ データなし → ここで止まる");
    return;
  }

  log("表示開始");

  // とりあえず最初の50件表示
  for(let i = 0; i < Math.min(50, data.length); i++){
    showComment(data[i]);
  }

}

</script>

</body>
</html>
