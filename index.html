<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（スマホデバッグ版）</title>

<style>
body { font-family: sans-serif; margin-right: 160px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 150px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

.vertical {
  writing-mode: vertical-rl;
  height: 120px;
}

button {
  width: 100%;
  margin-top: 5px;
}

.time {
  color: gray;
  font-size: 12px;
}

input {
  width: 100%;
  margin-top: 5px;
}

#debug {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 150px;
  background: #000;
  color: #0f0;
  font-size: 12px;
  overflow: auto;
  padding: 5px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（スマホデバッグ版）</h2>

<div id="control">

<div>速度</div>
<input type="range" id="speed" min="1" max="10000" value="100" class="vertical">
<div id="speedVal">100x</div>

<hr>

<div>位置</div>
<input type="range" id="seek" min="0" max="100" value="0" class="vertical">
<div id="seekVal">0%</div>

<hr>

<div>開始時間</div>
<input type="text" id="startTimeInput" placeholder="2026/3/28 19:44:13">
<button onclick="jumpToTime()">時間ジャンプ</button>

<button onclick="start()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="scrollBottom()">↓</button>

</div>

<div id="list"></div>

<pre id="debug"></pre>

<script>

let data = [];
let running = false;
let paused = false;

let startTime = 0;
let baseTime = 0;
let index = 0;

const list = document.getElementById("list");
const speedEl = document.getElementById("speed");
const seekEl = document.getElementById("seek");

function log(msg){
  console.log(msg);
  const d = document.getElementById("debug");
  d.textContent += msg + "\n";
  d.scrollTop = d.scrollHeight;
}

speedEl.oninput = () => {
  document.getElementById("speedVal").innerText = speedEl.value + "x";
};

seekEl.oninput = () => {
  document.getElementById("seekVal").innerText = seekEl.value + "%";
};

function timeAgo(dateString){
  const now = new Date();
  const past = new Date(dateString);
  const diff = (now - past) / 1000;

  if(diff < 60) return Math.floor(diff) + "秒前";
  if(diff < 3600) return Math.floor(diff/60) + "分前";
  if(diff < 86400) return Math.floor(diff/3600) + "時間前";
  if(diff < 2592000) return Math.floor(diff/86400) + "日前";
  if(diff < 31536000) return Math.floor(diff/2592000) + "ヶ月前";
  return Math.floor(diff/31536000) + "年前";
}

async function loadData(){
  log("データ読み込み中...");
  const res = await fetch("comments.json");
  data = await res.json();

  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));

  log("読み込み完了: " + data.length + "件");
}

let autoScroll = true;
window.addEventListener("scroll", () => {
  autoScroll = window.innerHeight + window.scrollY >= document.body.offsetHeight - 100;
});

const commentMap = {};

function showComment(c){
  const div = document.createElement("div");
  div.className = "comment";

  if(c.parent_id){
    div.classList.add("reply");
  }

  const exact = new Date(c.datetime_created).toLocaleString();

  div.innerHTML = `
<b>${c.author.username}</b>
<div class="time">${timeAgo(c.datetime_created)} / ${exact}</div>
<div>${c.content}</div>
`;

  commentMap[c.id] = div;

  if(c.parent_id && commentMap[c.parent_id]){
    commentMap[c.parent_id].appendChild(div);
  } else {
    list.appendChild(div);
  }

  if(autoScroll){
    window.scrollTo({ top: document.body.scrollHeight });
  }
}

async function jumpToTime(){

  if(data.length === 0){
    await loadData();
  }

  const input = document.getElementById("startTimeInput").value;
  const target = new Date(input).getTime();

  if(isNaN(target)){
    alert("時間の形式が違う");
    return;
  }

  log("=== ジャンプ開始 ===");
  log("入力時間: " + new Date(target));

  let closestIndex = data.length - 1;

  for(let i = 0; i < data.length; i++){
    let t = new Date(data[i].datetime_created).getTime();

    if(t >= target){

      if(i > 0){
        let prev = new Date(data[i-1].datetime_created).getTime();

        log("候補: " + new Date(prev) + " / " + new Date(t));

        if(Math.abs(prev - target) < Math.abs(t - target)){
          closestIndex = i - 1;
        } else {
          closestIndex = i;
        }
      } else {
        closestIndex = i;
      }

      break;
    }
  }

  log("選ばれた: " + new Date(data[closestIndex].datetime_created));

  const percent = Math.floor((closestIndex / data.length) * 100);
  seekEl.value = percent;
  document.getElementById("seekVal").innerText = percent + "%";

  running = false;

  setTimeout(() => {
    start();
  }, 50);
}

async function start(){

  if(running) return;
  running = true;
  paused = false;

  if(data.length === 0){
    await loadData();
  }

  list.innerHTML = "";
  Object.keys(commentMap).forEach(k => delete commentMap[k]);

  const seekIndex = Math.floor((seekEl.value / 100) * data.length);
  baseTime = new Date(data[seekIndex].datetime_created).getTime();

  startTime = Date.now();
  index = seekIndex;

  function loop(){

    if(!running) return;

    if(paused){
      requestAnimationFrame(loop);
      return;
    }

    let speed = speedEl.value;
    let elapsed = (Date.now() - startTime) * speed;

    while(index < data.length){

      let t = new Date(data[index].datetime_created).getTime();
      let rel = t - baseTime;

      if(rel > elapsed) break;

      showComment(data[index]);
      index++;

      seekEl.value = Math.floor((index / data.length) * 100);
      document.getElementById("seekVal").innerText = seekEl.value + "%";
    }

    requestAnimationFrame(loop);
  }

  loop();
}

function pause(){
  paused = !paused;

  if(!paused){
    startTime = Date.now() - (new Date(data[index]?.datetime_created).getTime() - baseTime) / speedEl.value;
  }
}

function scrollBottom(){
  window.scrollTo({ top: document.body.scrollHeight });
  autoScroll = true;
}

</script>

</body>
</html>
