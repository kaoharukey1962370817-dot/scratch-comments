<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（強化版）</title>

<style>
body { font-family: sans-serif; margin-right: 120px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

/* 右固定UI */
#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 100px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

button {
  width: 100%;
  margin-top: 5px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（強化版）</h2>

<div id="control">
  <div>速度</div>
  <input type="range" id="speed" min="1" max="10000" value="100" style="writing-mode: bt-lr; height:150px;">
  <div id="speedVal">100x</div>

  <button onclick="start()">▶</button>
  <button onclick="pause()">⏸</button>
  <button onclick="scrollBottom()">↓</button>
</div>

<div id="list"></div>

<script>

let data = [];
let running = false;
let paused = false;

const list = document.getElementById("list");
const speedEl = document.getElementById("speed");

// --- 速度表示（リアルタイム） ---
speedEl.oninput = function(){
  document.getElementById("speedVal").innerText = this.value + "x";
};

// --- JSON読み込み ---
async function loadData(){
  const res = await fetch("comments.json");
  data = await res.json();

  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));
}

// --- 自動スクロール判定（改善版） ---
let autoScroll = true;

window.addEventListener("scroll", () => {
  const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 100;
  autoScroll = nearBottom;
});

// --- コメント表示 ---
function showComment(c){
  const div = document.createElement("div");
  div.className = "comment";

  if(c.is_reply){
    div.classList.add("reply");
  }

  div.innerHTML = `
    <b>${c.author.username}</b><br>
    ${c.content}
  `;

  list.appendChild(div);

  // 改善スクロール
  if (autoScroll) {
    window.scrollTo({
      top: document.body.scrollHeight,
      behavior: "smooth"
    });
  }
}

// --- 再生 ---
async function start(){
  if(running) return;

  running = true;
  paused = false;

  await loadData();

  for(let i=0;i<data.length;i++){

    while(paused){
      await new Promise(r => setTimeout(r, 100));
    }

    showComment(data[i]);

    if(i < data.length - 1){

      let t1 = new Date(data[i].datetime_created);
      let t2 = new Date(data[i+1].datetime_created);

      let diff = (t2 - t1) / 1000;

      // 👇 毎回取得（リアル変更対応）
      let speed = speedEl.value;

      let wait = diff / speed;

      if(wait < 0.01) wait = 0.01;

      await new Promise(r => setTimeout(r, wait * 1000));
    }
  }

  running = false;
}

// --- 一時停止 ---
function pause(){
  paused = !paused;
}

// --- 最新へ ---
function scrollBottom(){
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  autoScroll = true;
}

</script>

</body>
</html>
