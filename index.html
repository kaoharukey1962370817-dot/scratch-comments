<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（完全版）</title>

<style>
body { font-family: sans-serif; margin-right: 160px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 150px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

.vertical {
  writing-mode: vertical-rl;
  height: 120px;
}

button {
  width: 100%;
  margin-top: 5px;
}

.time {
  color: gray;
  font-size: 12px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（返信完全対応）</h2>

<div id="control">
<div>速度</div>
<input type="range" id="speed" min="1" max="10000" value="1" class="vertical">
<div id="speedVal">1x</div>

<hr>

<button onclick="start()">▶ 再生</button>
<button onclick="stop()">⏸ 停止</button>
<button onclick="reset()">🔄 リセット</button>
</div>

<div id="comments"></div>

<script>
let comments = [];
let index = 0;
let timer = null;
let commentMap = {};

async function load() {
  const res = await fetch("comments.json");
  comments = await res.json();
  comments.sort((a, b) => a.time - b.time);
}

function renderComment(c) {
  const div = document.createElement("div");
  div.className = "comment";

  if (c.parent_id) div.classList.add("reply");

  div.innerHTML = `
    <b>${c.user}</b>: ${c.text}
    <div class="time">${new Date(c.time * 1000).toLocaleString()}</div>
  `;

  commentMap[c.id] = div;

  if (c.parent_id && commentMap[c.parent_id]) {
    commentMap[c.parent_id].appendChild(div);
  } else {
    document.getElementById("comments").appendChild(div);
  }
}

function start() {
  if (timer) return;

  const speed = document.getElementById("speed").value;

  timer = setInterval(() => {
    if (index >= comments.length) {
      stop();
      return;
    }

    renderComment(comments[index]);
    index++;
  }, 1000 / speed);
}

function stop() {
  clearInterval(timer);
  timer = null;
}

function reset() {
  stop();
  index = 0;
  document.getElementById("comments").innerHTML = "";
  commentMap = {};
}

document.getElementById("speed").addEventListener("input", e => {
  document.getElementById("speedVal").innerText = e.target.value + "x";
});

load();
</script>

</body>
</html>
