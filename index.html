<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>会話タイムマシン（完全最終＋時間表示）</title>

<style>
body { font-family: sans-serif; margin-right: 140px; }

.comment {
  padding: 6px;
  border-bottom: 1px solid #ccc;
}

.reply {
  margin-left: 20px;
  background: #f5f5f5;
  border-left: 3px solid #999;
}

#control {
  position: fixed;
  top: 10px;
  right: 10px;
  width: 120px;
  background: #fff;
  border: 1px solid #ccc;
  padding: 10px;
}

.vertical {
  writing-mode: bt-lr;
  height: 150px;
}

button {
  width: 100%;
  margin-top: 5px;
}

.time {
  color: gray;
  font-size: 12px;
}
</style>
</head>
<body>

<h2>⏳ 会話タイムマシン（完全最終＋時間表示）</h2>

<div id="control">

  <div>速度</div>
  <input type="range" id="speed" min="1" max="10000" value="100" class="vertical">
  <div id="speedVal">100x</div>

  <hr>

  <div>位置</div>
  <input type="range" id="seek" min="0" max="100" value="0" class="vertical">
  <div id="seekVal">0%</div>

  <button onclick="start()">▶</button>
  <button onclick="pause()">⏸</button>
  <button onclick="scrollBottom()">↓</button>

</div>

<div id="list"></div>

<script>

let data = [];
let running = false;
let paused = false;

let startTime = 0;
let baseTime = 0;
let index = 0;

const list = document.getElementById("list");
const speedEl = document.getElementById("speed");
const seekEl = document.getElementById("seek");

// 表示更新
speedEl.oninput = () => {
  document.getElementById("speedVal").innerText = speedEl.value + "x";
};

seekEl.oninput = () => {
  document.getElementById("seekVal").innerText = seekEl.value + "%";
};

// 時間表示関数
function timeAgo(dateString){
  const now = new Date();
  const past = new Date(dateString);
  const diff = (now - past) / 1000;

  if(diff < 60) return Math.floor(diff) + "秒前";
  if(diff < 3600) return Math.floor(diff/60) + "分前";
  if(diff < 86400) return Math.floor(diff/3600) + "時間前";
  if(diff < 2592000) return Math.floor(diff/86400) + "日前";
  if(diff < 31536000) return Math.floor(diff/2592000) + "ヶ月前";

  return Math.floor(diff/31536000) + "年前";
}

// データ読み込み
async function loadData(){
  const res = await fetch("comments.json");
  data = await res.json();

  data.sort((a,b) => new Date(a.datetime_created) - new Date(b.datetime_created));
}

// スクロール制御
let autoScroll = true;
window.addEventListener("scroll", () => {
  autoScroll = window.innerHeight + window.scrollY >= document.body.offsetHeight - 100;
});

// 返信ツリー
const commentMap = {};

// コメント表示
function showComment(c){
  const div = document.createElement("div");
  div.className = "comment";

  if(c.parent_id){
    div.classList.add("reply");
  }

  const exact = new Date(c.datetime_created).toLocaleString();

  div.innerHTML = `
    <b>${c.author.username}</b>
    <div class="time">${timeAgo(c.datetime_created)} / ${exact}</div>
    <div>${c.content}</div>
  `;

  commentMap[c.id] = div;

  if(c.parent_id && commentMap[c.parent_id]){
    commentMap[c.parent_id].appendChild(div);
  } else {
    list.appendChild(div);
  }

  if(autoScroll){
    window.scrollTo({ top: document.body.scrollHeight });
  }
}

// 再生（完全同期）
async function start(){

  if(running) return;
  running = true;
  paused = false;

  if(data.length === 0){
    await loadData();
  }

  list.innerHTML = "";
  Object.keys(commentMap).forEach(k => delete commentMap[k]);

  const seekIndex = Math.floor((seekEl.value / 100) * data.length);
  baseTime = new Date(data[seekIndex].datetime_created).getTime();

  startTime = Date.now();
  index = seekIndex;

  function loop(){

    if(!running) return;

    if(paused){
      requestAnimationFrame(loop);
      return;
    }

    let speed = speedEl.value;
    let elapsed = (Date.now() - startTime) * speed;

    while(index < data.length){

      let t = new Date(data[index].datetime_created).getTime();
      let rel = t - baseTime;

      if(rel > elapsed) break;

      showComment(data[index]);
      index++;

      seekEl.value = Math.floor((index / data.length) * 100);
      document.getElementById("seekVal").innerText = seekEl.value + "%";
    }

    requestAnimationFrame(loop);
  }

  loop();
}

// 一時停止
function pause(){
  paused = !paused;

  if(!paused){
    startTime = Date.now() - (new Date(data[index]?.datetime_created).getTime() - baseTime) / speedEl.value;
  }
}

// 最新へ
function scrollBottom(){
  window.scrollTo({ top: document.body.scrollHeight });
  autoScroll = true;
}

</script>

</body>
</html>
